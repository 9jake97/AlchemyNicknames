# Default Locked Pin Configuration
default_locked_pin:
  material: NAME_TAG
  display_name: "&c%name% (Locked)"
  lore:
    - "&cYou do not own this pin."
    - "&7Purchase it at store.example.com"

# Default Unlocked Lore
