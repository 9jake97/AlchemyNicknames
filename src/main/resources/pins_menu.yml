size: 54
paginated: true

# Offset for the menu title (useful for shifting custom texture titles with negative space)
# Example: "\uF808\uF808" (depends on your resource pack)
menu_title_offset: ""

# Categories
# Each category acts as a button (slot) and changes the GUI title (texture)
categories:
  'others':
    title_unicode: "\uE001"
    display_name: "\u1234" # Unicode Character for the button itself
    slot: 1
    material: PAPER
    lore:
      - '&7Tags Category'
  'icons':
    title_unicode: "\uE002"
    display_name: "\u1235"
    slot: 2
    material: PAPER
    lore:
      - '&7Tags Category'
  'games':
    title_unicode: "\uE003"
    display_name: "\u1236"
    slot: 3
    material: PAPER
    lore:
      - '&7Tags Category'
  'all':
    title_unicode: "\uE004"
    display_name: "\u1237"
    slot: 4
    material: PAPER
    lore:
      - '&7Tags Category'
  'movies':
    title_unicode: "\uE005"
    display_name: "\u1238"
    slot: 5
    material: PAPER
    lore:
      - '&7Tags Category'
  'animals':
    title_unicode: "\uE006"
    display_name: "\u1239"
    slot: 6
    material: PAPER
    lore:
      - '&7Tags Category'
  'foods':
    title_unicode: "\uE007"
    display_name: "\u123A"
    slot: 7
    material: PAPER
    lore:
      - '&7Tags Category'

# Pins Area
pin_slots: [19, 20, 21, 22, 23, 24, 25, 28, 29, 30, 31, 32, 33, 34]

# Fixed Items
fixed_items:
  'page_previous_category':
    material: PAPER
    slot: 0
    display_name: "\u2B05" # Left Arrow Unicode
    action: "previous_page"

  'page_next_category':
    material: PAPER
    slot: 8
    display_name: "\u27A1" # Right Arrow Unicode
    action: "next_page"

  'sidebar_next':
    material: PAPER
    display_name: "\u27A1" # Right Arrow Unicode
    slots: [26, 35, 44]
    action: "next_page"

  'sidebar_prev':
    material: PAPER
    display_name: "\u2B05" # Left Arrow Unicode
    slots: [18, 27, 36]
    action: "previous_page"

  'clear_tag':
    material: PAPER
    slot: 49
    display_name: "\u274C" # X Unicode
    lore:
      - '&e➥ Left-Click to clear tag'
    action: "reset"
